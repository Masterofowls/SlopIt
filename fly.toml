# Fly.io configuration — SlopIt backend
# Docs: https://fly.io/docs/reference/configuration/

app = "slopit-api"
primary_region = "fra"   # Frankfurt — change to nearest

kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Run DB migrations + collectstatic on every release.
  release_command = "sh -c 'cd src/slopit && python manage.py migrate --noinput'"
  strategy = "rolling"

[env]
  PORT = "8000"
  DJANGO_SETTINGS_MODULE = "config.settings.prod"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 2000
    hard_limit = 2500

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    timeout = "10s"
    method = "GET"
    path = "/api/v1/system/status"
    headers = {Host = "slopit-api.fly.dev"}

[[vm]]
  cpu_kind = "shared"
  cpus = 4
  memory = "1gb"

# Secrets are NOT defined here — set them with:
#   flyctl secrets set DJANGO_SECRET_KEY=... DATABASE_URL=... GOOGLE_OAUTH_CLIENT_ID=... ...
