name: Deploy

on:
  # Auto-deploy only after CI passes on main
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  # Allow one-click manual deploy from the Actions UI
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend to Fly.io
    runs-on: ubuntu-latest
    # For workflow_run: only proceed if CI passed. Manual dispatch always runs.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy -c backend/fly.toml --remote-only --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
