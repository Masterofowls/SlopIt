name: Deploy Frontend

on:
  push:
    branches:
      - main
      - frontend
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-branch
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy frontend to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_FRONTEND || secrets.FLY_API_TOKEN }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate Fly token
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "Missing Fly token. Add FLY_API_TOKEN_FRONTEND (preferred) or FLY_API_TOKEN in GitHub Actions secrets."
            exit 1
          fi

      - name: Deploy frontend
        run: flyctl deploy --remote-only --config fly.toml
