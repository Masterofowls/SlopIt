<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SlopIt social feed">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06130c"/>
      <stop offset="55%" stop-color="#0b2a18"/>
      <stop offset="100%" stop-color="#123d24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dff9a"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="72" width="1056" height="486" rx="28" fill="rgba(255,255,255,0.04)" stroke="rgba(125,255,154,0.35)" stroke-width="3"/>
  <text x="120" y="250" fill="url(#accent)" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="700">SlopIt</text>
  <text x="120" y="330" fill="#d7ffe3" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="600">Social feed for memes, posts &amp; reactions</text>
  <text x="120" y="410" fill="#9fd9b0" font-family="Arial, Helvetica, sans-serif" font-size="28">Browse trending slop. Post. React. Repeat.</text>
  <circle cx="980" cy="170" r="72" fill="rgba(57,255,20,0.12)" stroke="#39ff14" stroke-width="4"/>
  <text x="980" y="188" text-anchor="middle" fill="#39ff14" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">:3</text>
