app = "slopit-telegram-oidc"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[env]
  ISSUER = "https://slopit-telegram-oidc.fly.dev"
  OIDC_CLIENT_ID = "slopit-clerk"
